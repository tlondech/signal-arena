name: Debug NBA Fetch

on:
  workflow_dispatch:
    inputs:
      timeout:
        description: 'Request timeout in seconds'
        required: false
        default: '60'

jobs:
  debug-nba:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show runner IP
        run: curl -s https://api.ipify.org && echo

      - name: Debug NBA fetch
        env:
          NBA_DEBUG_TIMEOUT: ${{ github.event.inputs.timeout }}
        run: |
          python - <<'EOF'
          import sys
          import time
          import json
          import urllib.request

          timeout = int(__import__("os").environ.get("NBA_DEBUG_TIMEOUT", 60))

          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) "
                  "Chrome/120.0.0.0 Safari/537.36"
              ),
              "Referer": "https://www.nba.com/",
              "Accept": "application/json, text/plain, */*",
              "Accept-Language": "en-US,en;q=0.9",
              "x-nba-stats-origin": "stats",
              "x-nba-stats-token": "true",
              "Origin": "https://www.nba.com",
              "Host": "stats.nba.com",
          }

          url = (
              "https://stats.nba.com/stats/leaguegamefinder"
              "?LeagueID=00&Season=2025-26&SeasonType=Regular+Season"
          )

          print(f"Target URL : {url}")
          print(f"Timeout    : {timeout}s")
          print(f"Headers    : {json.dumps(headers, indent=2)}")
          print()

          # ── 1. Raw urllib (no nba_api) ────────────────────────────
          print("=== Test 1: raw urllib request ===")
          req = urllib.request.Request(url, headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  body = resp.read(512)
                  print(f"HTTP {resp.status} — first 512 bytes:")
                  print(body[:512])
          except Exception as exc:
              print(f"FAILED: {type(exc).__name__}: {exc}")
          print()

          # ── 2. Same request without browser headers ───────────────
          print("=== Test 2: raw urllib — NO custom headers ===")
          req_bare = urllib.request.Request(url)
          try:
              with urllib.request.urlopen(req_bare, timeout=timeout) as resp:
                  body = resp.read(512)
                  print(f"HTTP {resp.status} — first 512 bytes:")
                  print(body[:512])
          except Exception as exc:
              print(f"FAILED: {type(exc).__name__}: {exc}")
          print()

          # ── 3. nba_api with headers ───────────────────────────────
          print("=== Test 3: nba_api LeagueGameFinder with headers ===")
          try:
              from nba_api.stats.endpoints import leaguegamefinder
              time.sleep(1)
              finder = leaguegamefinder.LeagueGameFinder(
                  league_id_nullable="00",
                  season_nullable="2025-26",
                  season_type_nullable="Regular Season",
                  timeout=timeout,
                  headers=headers,
              )
              df = finder.get_data_frames()[0]
              print(f"OK — {len(df)} rows returned")
          except Exception as exc:
              print(f"FAILED: {type(exc).__name__}: {exc}")
          print()

          # ── 4. nba_api without headers ────────────────────────────
          print("=== Test 4: nba_api LeagueGameFinder without headers ===")
          try:
              from nba_api.stats.endpoints import leaguegamefinder
              time.sleep(1)
              finder = leaguegamefinder.LeagueGameFinder(
                  league_id_nullable="00",
                  season_nullable="2025-26",
                  season_type_nullable="Regular Season",
                  timeout=timeout,
              )
              df = finder.get_data_frames()[0]
              print(f"OK — {len(df)} rows returned")
          except Exception as exc:
              print(f"FAILED: {type(exc).__name__}: {exc}")

          EOF
